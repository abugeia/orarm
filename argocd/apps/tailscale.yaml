apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: tailscale-operator
      repoURL: https://pkgs.tailscale.com/helmcharts
      targetRevision: 1.92.5
      helm:
        releaseName: tailscale-operator
        valueFiles:
          - $values/apps/tools/tailscale/values.yaml
    # Source pour les valeurs (sans path pour que $values pointe à la racine du repo)
    - repoURL: https://github.com/abugeia/orarm.git
      targetRevision: main
      ref: values
    # Source pour les manifestes Kustomize
    - repoURL: https://github.com/abugeia/orarm.git
      path: apps/tools/tailscale
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
